<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年 同窓会総会</title>
    <style>
        /* 全体のリセットと中央寄せ */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            font-family: sans-serif;
        }

        /* カルーセルと戻るボタンを縦に並べるためのコンテナ */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
        }

        /* カルーセルの外枠 */
        .carousel-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            touch-action: pan-y;
        }

        /* スライド全体のラッパー */
        .carousel-slides {
            display: flex;
            width: 800%;
            height: 100%;
            transition: transform 0.4s ease-out;
        }

        /* 各スライド（画像・動画） */
        .slide {
            width: 12.5%;
            height: 100%;
        }

        /* ③ 動画（video）にも同じスタイルを適用 */
        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* 矢印ボタン共通 */
        .prev-btn, .next-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 14px 18px;
            cursor: pointer;
            font-size: 20px;
            border-radius: 50%;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
        }

        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        @media (max-width: 500px) {
            .prev-btn, .next-btn {
                display: none;
            }
        }

        /* ページネーション（ドット） */
        .dots-container {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, transform 0.3s;
        }

        .dot.active {
            background-color: white;
            transform: scale(1.1);
        }

        /* 「戻る」ボタン */
        .back-btn {
            display: inline-block;
            width: 80%;
            max-width: 200px;
            text-align: center;
            padding: 14px 0;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #6c757d;
            text-decoration: none;
            border-radius: 40px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s;
        }

        /* モーダル（拡大画面） */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 95%;
            max-height: 85%;
            object-fit: contain;
            animation: zoomIn 0.25s ease-out;
        }

        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 閉じるボタン */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 38px;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 1010;
        }
    </style>
</head>
<body>

    <div class="wrapper">

        <div class="carousel-container" id="carouselContainer">
            <div class="carousel-slides" id="slides">
              <div class="slide"><video src="movie01.mp4" loop muted autoplay playsinline></video></div>
              <div class="slide"><img src="image01.jpg" alt="画像1"></div>
              <div class="slide"><img src="image02.jpg" alt="画像2"></div>
              <div class="slide"><img src="image03.jpg" alt="画像3"></div>
              <div class="slide"><img src="image04.jpg" alt="画像4"></div>
              <div class="slide"><img src="image05.jpg" alt="画像5"></div>
              <div class="slide"><img src="image06.jpg" alt="画像6"></div>
              <div class="slide"><video src="movie02.mp4" loop muted autoplay playsinline></video></div>
            </div>

            <button class="prev-btn" id="prevBtn">&#10094;</button>
            <button class="next-btn" id="nextBtn">&#10095;</button>

            <div class="dots-container">
                <span class="dot active" onclick="currentSlide(0)"></span>
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
                <span class="dot" onclick="currentSlide(5)"></span>
                <span class="dot" onclick="currentSlide(6)"></span>
                <span class="dot" onclick="currentSlide(7)"></span>
            </div>
        </div>

        <a href="../index.html" class="back-btn">戻る</a>

    </div>

    <!-- ② モーダル内に動画用タグを追加（controlsで再生バーを表示） -->
    <div class="modal" id="imageModal">
        <span class="close-btn" id="closeModal">&times;</span>
        <img class="modal-content" id="modalImg" alt="拡大画像" style="display: none;">
        <video class="modal-content" id="modalVideo" controls style="display: none;"></video>
    </div>

    <script>
        const slides = document.getElementById('slides');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = 8;
        let currentIndex = 0;
        let timer;

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const modalVideo = document.getElementById('modalVideo'); // ④動画要素を取得
        const carouselItems = document.querySelectorAll('.slide img, .slide video'); // ④動画も対象に含める
        const container = document.getElementById('carouselContainer');

        function updateCarousel() {
            slides.style.transform = `translateX(-${currentIndex * 12.5}%)`;
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            updateCarousel();
            resetTimer();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            updateCarousel();
            resetTimer();
        }

        function currentSlide(index) {
            currentIndex = index;
            updateCarousel();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            timer = setInterval(nextSlide, 4000);
        }

        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);

        /* ==========================================
           スマホ用：スワイプ（フリック）操作の実装
        ========================================== */
        let touchStartX = 0;
        let touchEndX = 0;
        let isSwiping = false;

        container.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchEndX = touchStartX;
            isSwiping = false;
        }, { passive: true });

        container.addEventListener('touchmove', (e) => {
            touchEndX = e.touches[0].clientX;
            if (Math.abs(touchStartX - touchEndX) > 10) {
                isSwiping = true;
            }
        }, { passive: true });

        container.addEventListener('touchend', () => {
            const swipeDistance = touchStartX - touchEndX;
            const threshold = 40;

            if (Math.abs(swipeDistance) > threshold) {
                if (swipeDistance > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
        });

        /* ==========================================
           ④ 拡大モーダルの制御（画像・動画の判定付き）
        ========================================== */
        carouselItems.forEach(item => {
            item.addEventListener('click', function() {
                if (isSwiping) return;

                modal.style.display = 'flex';
                clearInterval(timer); // カルーセルの自動再生をストップ

                if (this.tagName === 'VIDEO') {
                    // クリックされたのが動画だった場合
                    modalImg.style.display = 'none';
                    modalVideo.style.display = 'block';
                    modalVideo.src = this.src;
                    modalVideo.play(); // 音付きで自動再生開始
                } else {
                    // クリックされたのが画像だった場合
                    modalVideo.style.display = 'none';
                    modalImg.style.display = 'block';
                    modalImg.src = this.src;
                }
            });
        });

        // ④ モーダルを閉じる処理（動画停止処理を含む）
        function closeModalWindow() {
            modal.style.display = 'none';
            modalVideo.pause();  // 動画を一時停止
            modalVideo.src = ""; // ソースを空にして完全に再生を止める（音残り防止）
            resetTimer();        // カルーセルの自動再生を再開
        }

        closeModal.addEventListener('click', closeModalWindow);

        modal.addEventListener('click', (e) => {
            // 背景の黒い部分、または動画プレイヤー自体ではなくモーダル外枠がクリックされたら閉じる
            if (e.target === modal) {
                closeModalWindow();
            }
        });

        resetTimer();
    </script>

</body>
</html>
